<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e74c3c">
  <title>🍅 Pomodoro 番茄时钟</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>🍅 Pomodoro</h1>
      <button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换主题">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <!-- Mode Tabs -->
    <nav class="mode-tabs" role="tablist" aria-label="计时模式">
      <button class="mode-tab active" data-mode="work" role="tab" aria-selected="true">🍅 专注工作</button>
      <button class="mode-tab" data-mode="shortBreak" role="tab" aria-selected="false">☕ 短休息</button>
      <button class="mode-tab" data-mode="longBreak" role="tab" aria-selected="false">🎉 长休息</button>
    </nav>

    <!-- Timer Display -->
    <main class="timer-section">
      <div class="timer-ring-container">
        <svg class="timer-ring" viewBox="0 0 200 200" aria-hidden="true">
          <!-- Background circle -->
          <circle class="timer-ring-bg" cx="100" cy="100" r="90"
                  fill="none" stroke-width="6"/>
          <!-- Progress circle -->
          <circle class="timer-ring-progress" cx="100" cy="100" r="90"
                  fill="none" stroke-width="6"
                  stroke-linecap="round"
                  stroke-dasharray="565.49"
                  stroke-dashoffset="0"
                  transform="rotate(-90 100 100)"/>
        </svg>
        <div class="timer-display">
          <span class="timer-minutes" id="timerMinutes">25</span>
          <span class="timer-separator">:</span>
          <span class="timer-seconds" id="timerSeconds">00</span>
        </div>
      </div>

      <!-- State indicator -->
      <p class="timer-state" id="timerState">准备开始</p>

      <!-- Controls -->
      <div class="controls">
        <button class="btn btn-primary" id="btnStart" title="开始 (Space)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="icon-play"><path d="M8 5v14l11-7z"/></svg>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="icon-pause"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          <span id="btnStartText">开始</span>
        </button>
        <button class="btn btn-secondary" id="btnReset" title="重置 (R)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          <span>重置</span>
        </button>
        <button class="btn btn-secondary" id="btnSkip" title="跳过当前阶段">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          <span>跳过</span>
        </button>
      </div>
    </main>

    <!-- Stats -->
    <section class="stats" aria-label="统计">
      <div class="cycle-indicator" id="cycleIndicator" title="循环进度">
        <!-- Filled dynamically by JS -->
      </div>
      <p class="today-count">
        🍅 今日完成: <strong id="todayCount">0</strong> 个番茄
      </p>
    </section>

    <!-- Settings trigger -->
    <button class="btn-settings" id="btnSettingsOpen" title="设置" aria-label="打开设置">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal" aria-hidden="true">
      <div class="modal" role="dialog" aria-labelledby="settingsTitle">
        <div class="modal-header">
          <h2 id="settingsTitle">⚙ 设置</h2>
          <button class="btn-close" id="btnSettingsClose" aria-label="关闭设置">&times;</button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label for="workDuration">🍅 工作时长 (分钟)</label>
            <div class="range-input">
              <input type="range" id="workDuration" min="1" max="60" value="25" step="1">
              <span class="range-value" id="workDurationVal">25</span>
            </div>
          </div>
          <div class="setting-group">
            <label for="shortBreakDuration">☕ 短休息时长 (分钟)</label>
            <div class="range-input">
              <input type="range" id="shortBreakDuration" min="1" max="30" value="5" step="1">
              <span class="range-value" id="shortBreakDurationVal">5</span>
            </div>
          </div>
          <div class="setting-group">
            <label for="longBreakDuration">🎉 长休息时长 (分钟)</label>
            <div class="range-input">
              <input type="range" id="longBreakDuration" min="1" max="60" value="15" step="1">
              <span class="range-value" id="longBreakDurationVal">15</span>
            </div>
          </div>
          <div class="setting-group">
            <label for="longBreakInterval">长休息间隔 (几个工作循环后)</label>
            <div class="range-input">
              <input type="range" id="longBreakInterval" min="2" max="8" value="4" step="1">
              <span class="range-value" id="longBreakIntervalVal">4</span>
            </div>
          </div>
          <div class="setting-group">
            <label for="soundVolume">🔊 提示音量</label>
            <div class="range-input">
              <input type="range" id="soundVolume" min="0" max="100" value="70" step="5">
              <span class="range-value" id="soundVolumeVal">70%</span>
            </div>
          </div>
          <div class="setting-group">
            <label>
              <input type="checkbox" id="autoStartBreaks" checked>
              休息时自动开始计时
            </label>
          </div>
          <div class="setting-group">
            <label>
              <input type="checkbox" id="autoStartWork" checked>
              休息结束后自动开始工作
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Keyboard shortcut hint -->
    <footer class="footer">
      <span>Space 开始/暂停</span>
      <span>R 重置</span>
      <span>S 跳过</span>
    </footer>
  </div>

  <script src="js/timer.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
